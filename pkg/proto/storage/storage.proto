syntax = "proto3";

package storage;

import "google/protobuf/empty.proto";

option go_package = "github.com/neelalala/go-storage/pkg/proto/storage";

service Storage {
  rpc SaveObject(SaveRequest) returns (google.protobuf.Empty) {}
  
  rpc GetObject(GetRequest) returns (GetResponse) {}
  
  rpc DeleteObject(DeleteRequest) returns (google.protobuf.Empty) {}

  rpc GetNodeInfo(google.protobuf.Empty) returns (NodeInfo) {}
}

message Object {
  string name = 1;
  bytes data = 2;
}

message SaveRequest {
  Object object = 1;
}

message GetRequest {
  string name = 1;
}

message GetResponse {
  Object object = 1;
}

message DeleteRequest {
  string name = 1;
}

message NodeInfo {
  string id = 1;
}
